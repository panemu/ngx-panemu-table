<div class="panemu-query" [class.disabled]="disabled()">


  @if (_filterableColumns().length) {

    <div class="button-panel criteria">
      <button class="btn" (click)="showQueryBuilder()" [disabled]="disabled()">
        <span class="ngx-panemu-table-icon icon-search"></span>
      </button>

      @if(this.controller().criteria) {
        <button class="btn close-button" (click)="clearCriteria()" [disabled]="disabled()">
          <span class="ngx-panemu-table-icon icon-close"></span>
        </button>
      }

    </div>
  }

  @if (hasGroupableColumn()) {
    <div class="button-panel groupby">
      <button class="btn btn-flex" [matMenuTriggerFor]="menu" [disabled]="disabled()">
        <span class="ngx-panemu-table-icon icon-splitscreen_top"></span>
        @if (groupByLabel) {
          <span class="btn-text group-label">{{groupByLabel}}</span>
        }
      </button>
      
      @if (groupByLabel) {
        
        <button class="btn close-button" (click)="clearGroup()" [disabled]="disabled()">
          <span class="ngx-panemu-table-icon icon-close"></span>
        </button>
      }
      
    </div>
  }
</div>
<mat-menu #menu="matMenu">
  <panemu-groupby [controller]="controller()" (click)="$event.stopPropagation();"></panemu-groupby>
</mat-menu>
